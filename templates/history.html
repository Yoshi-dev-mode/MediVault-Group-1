<!DOCTYPE html>
<html>

<head>
    <title>History - {{ patient_name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .history-container {
            padding: 40px;
            max-width: 1500px;
            margin: auto;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #2563eb;
            text-decoration: none;
        }

        .patient-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>
    <div class="history-container">
        <a href="/dashboard" class="back-btn"><i class="fa-regular fa-circle-left"></i> Back to Dashboard</a>

        <div class="patient-header">
            <h1>Medical History: {{ patient_name }}</h1>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Age</th>
                    <th>Gender</th>
                    <th>Sys BP</th>
                    <th>Dia BP</th>
                    <th>HR</th>
                    <th>Sugar</th>
                    <th>BMI</th>
                    <th>SpO2</th>
                    <th>Notes</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for entry in history %}
                <tr id="row-{{ entry[10] }}">
                    <form action="/update_history/{{ entry[10] }}" method="POST">
                        <td>{{ entry[0].strftime('%Y-%m-%d') }}</td>
                        <td><input type="number" name="age" value="{{ entry[6] }}" class="edit-input" readonly
                                style="width: 40px;"></td>
                        <td>
                            <select name="gender" class="edit-input" disabled>
                                <option value="Male" {% if entry[7]=='Male' %}selected{% endif %}>M</option>
                                <option value="Female" {% if entry[7]=='Female' %}selected{% endif %}>F</option>
                            </select>
                        </td>
                        <td><input type="text" name="bp_systolic" value="{{ entry[1] }}" class="edit-input" readonly
                                style="width: 60px;"></td>
                        <td><input type="number" name="bp_diastolic" value="{{ entry[8] }}" class="edit-input" readonly
                                style="width: 50px;"></td>
                        <td><input type="number" name="heart_rate" value="{{ entry[9] }}" class="edit-input" readonly
                                style="width: 50px;"></td>
                        <td><input type="number" name="sugar" value="{{ entry[2] }}" class="edit-input" readonly
                                style="width: 50px;"></td>
                        <td><input type="number" step="0.1" name="bmi" value="{{ entry[3] }}" class="edit-input"
                                readonly style="width: 50px;"></td>
                        <td><input type="number" name="spo2" value="{{ entry[4] }}" class="edit-input" readonly
                                style="width: 40px;">%</td>
                        <td><input type="text" name="notes" value="{{ entry[5]|default('', true) }}" class="edit-input"
                                readonly></td>

                        <td style="display: flex; gap: 10px; justify-content: center;">
                            <button type="button" onclick="enableEdit('{{ entry[10] }}')" class="btn-edit"
                                style="background: #3498db; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px;">
                                <i class="fas fa-pencil-alt"></i>
                            </button>

                            <button type="submit" id="save-{{ entry[10] }}" class="btn-save"
                                style="background: #2ecc71; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; display: none;">
                                <i class="fas fa-save"></i>
                            </button>
                        </td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        function enableEdit(vitalsId) {
            // Find the row
            const row = document.getElementById('row-' + vitalsId);

            // Find all inputs and selects in that row
            const inputs = row.querySelectorAll('.edit-input');

            inputs.forEach(input => {
                input.removeAttribute('readonly'); // Unlock inputs
                input.removeAttribute('disabled'); // Unlock select dropdowns
                input.style.border = "1px solid #3498db"; // Add a blue border to show it's editable
                input.style.backgroundColor = "#fff";
            });

            // Show the Save button for this row
            document.getElementById('save-' + vitalsId).style.display = 'inline-block';
        }
    </script>

</body>

</html>
