<!DOCTYPE html>
<html>

<head>
    <title>MediVault Login</title>
    <link rel="stylesheet" href="/static/style.css">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <div class="logo"><i class="fa-solid fa-stethoscope" style="margin-right: 10px;"></i>MediVault</div>

            <div class="subtitle">
                Secure Medical Records System
            </div>

            <form action="/" method="POST">
                <div class="input-group">
                    <label>Email Address</label> <input type="email" name="email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                {% if error %}
                <p style="color: red; font-size: 0.8rem; margin-bottom: 10px;">{{ error }}</p>
                {% endif %}

                <button type="submit" class="btn">
                    Login
                </button>

                <p class="no-account">Doesn't have an account? <a href="/register">Create Account</a></p>

            </form>

        </div>

    </div>

</body>

</html>
